name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  MISE_VERSION: "2026.4.18"
  MISE_GITHUB_ATTESTATIONS: "0"
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  CARGO_NET_RETRY: "10"
  RUSTUP_MAX_RETRIES: "10"

jobs:
  detect:
    name: Check for releasable changes
    runs-on: ubuntu-24.04
    outputs:
      should-release: ${{ steps.detect.outputs.should-release }}
      latest-version: ${{ steps.detect.outputs.latest-version }}
      next-version: ${{ steps.detect.outputs.next-version }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Install mise tools
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          version: ${{ env.MISE_VERSION }}
          cache: true
          install_args: git-cliff

      - name: Detect release
        id: detect
        run: mise run release:detect

  build:
    name: Build ${{ matrix.target }}
    needs: detect
    if: needs.detect.outputs.should-release == 'true'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
          - runner: macos-15-intel
            target: x86_64-apple-darwin
          - runner: macos-15
            target: aarch64-apple-darwin
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
    defaults:
      run:
        shell: bash
    # Rust is installed via dtolnay/rust-toolchain rather than mise: the
    # GitHub-hosted macos-15 (Apple Silicon) image ships a `rustup` that
    # dispatches to installer (setup) mode, so `rustup target add` fails.
    # Disabling the mise-managed rust keeps `mise run` from re-triggering it.
    env:
      MISE_DISABLE_TOOLS: rust
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: "1.94.0"
          targets: ${{ matrix.target }}

      - name: Install mise tools
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          version: ${{ env.MISE_VERSION }}
          cache: true
          install_args: 1password-cli jq

      - name: Cache Rust
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
        with:
          shared-key: release-${{ matrix.target }}
          cache-on-failure: true
          cache-bin: true

      - name: Package release archive
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          SWIFTERPM_SIGN_MACOS: ${{ contains(matrix.target, 'apple-darwin') }}
        run: mise run release:package --target "${{ matrix.target }}" --version "${{ needs.detect.outputs.next-version }}"

      - name: Upload release asset
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ${{ matrix.target }}
          path: dist/*

  publish:
    name: Publish GitHub release
    needs:
      - detect
      - build
    if: needs.detect.outputs.should-release == 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Install mise tools
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          version: ${{ env.MISE_VERSION }}
          cache: true
          install_args: git-cliff

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: dist

      - name: Flatten artifacts
        run: |
          find dist -mindepth 2 -type f -exec mv {} dist/ \;
          find dist -mindepth 1 -type d -empty -delete

      - name: Generate release notes
        run: mise run release:notes --version "${{ needs.detect.outputs.next-version }}" > release-notes.md

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: mise run release:publish --version "${{ needs.detect.outputs.next-version }}" --notes release-notes.md --dist dist
